# Reverse proxy for go-sim-backend (systemd) on the EC2 instance.
# Binds: server_name api.microsim.dev
# Upstream: 127.0.0.1:8000 — set PORT=8000 in the app .env (default in config).
#
# Install: /etc/nginx/conf.d/api.microsim.dev.conf (overwritten on each deploy)
#
# HTTPS: terminate TLS in front of this host (e.g. ALB/Cloudflare) on :443, or
# add a server { listen 443 ssl; ... } with Let’s Encrypt paths and reload nginx.

upstream go_sim_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.microsim.dev;

    client_max_body_size 20m;

    # Optional: long-lived streams (e.g. SSE) from the simulation API
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    location / {
        proxy_pass http://go_sim_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

# Map for optional WebSocket/SSE connection upgrade
map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}
